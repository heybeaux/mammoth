name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Locate PostgreSQL native tools
        run: pg_config --bindir

      - name: Create ephemeral profile credential
        run: echo "MAMMOTH_PG_PASSWORD=$(openssl rand -hex 24)" >> "$GITHUB_ENV"

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify evidence policy
        run: pnpm verify:evidence

      - name: Verify audit integrity
        run: pnpm verify:audit

      - name: Verify Phase 1
        run: pnpm verify:phase-1

      - name: Verify Phase 2
        run: pnpm verify:phase-2

      - name: Verify adapter contracts
        run: pnpm verify:adapters

      - name: Verify runtime composition
        run: pnpm verify:m2

      - name: Verify operator CLI
        run: pnpm verify:m3

      - name: Verify MVP acceptance
        run: pnpm --filter @mammoth/mvp-acceptance verify

      - name: Run offline evaluations
        run: pnpm eval:offline

      - name: Verify MVP checkpoint
        run: pnpm verify:mvp

      - name: Verify P2 production profile lifecycle and backup
        env:
          MAMMOTH_PROFILE_ROOT: ${{ runner.temp }}/mammoth-production-profile
        run: pnpm verify:p2:profile

      - name: Verify P3 Temporal acceptance
        run: pnpm verify:p3

      - name: Verify P4 research-cell contracts
        run: pnpm verify:p4

      - name: Verify P5 isolated divergence
        run: pnpm verify:p5
