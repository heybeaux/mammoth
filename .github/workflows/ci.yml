name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verification:
    name: verify / ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: static
            postgres: false
            command: |
              pnpm format:check
              pnpm lint
              pnpm typecheck
          - name: tests
            postgres: false
            command: pnpm test
          - name: build
            postgres: false
            command: pnpm build
          - name: foundation
            postgres: false
            command: |
              pnpm verify:evidence
              pnpm verify:audit
              pnpm verify:phase-1
              pnpm verify:phase-2
              pnpm verify:adapters
              pnpm verify:m2
              pnpm verify:m3
              pnpm --filter @mammoth/mvp-acceptance verify
              pnpm eval:offline
              pnpm verify:mvp
          - name: p2-p4
            postgres: true
            command: |
              pnpm verify:p2:profile
              pnpm verify:p3
              pnpm verify:p4
          - name: p5-p7
            postgres: false
            command: |
              pnpm verify:p5
              pnpm verify:p6
              pnpm verify:p7
          - name: p8-p9
            postgres: false
            command: |
              pnpm verify:p8
              pnpm verify:p9

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Locate PostgreSQL native tools
        if: matrix.postgres
        run: pg_config --bindir

      - name: Create ephemeral profile credential
        if: matrix.postgres
        run: echo "MAMMOTH_PG_PASSWORD=$(openssl rand -hex 24)" >> "$GITHUB_ENV"

      - name: Run ${{ matrix.name }} validation
        env:
          MAMMOTH_PROFILE_ROOT: ${{ runner.temp }}/mammoth-production-profile
        run: ${{ matrix.command }}

  verify:
    name: verify
    if: always()
    needs: verification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every validation group
        env:
          VERIFICATION_RESULT: ${{ needs.verification.result }}
        run: test "$VERIFICATION_RESULT" = success
